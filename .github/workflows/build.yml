name: Build & Publish Scripts

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:
    inputs:
      reason:
        description: '触发原因（如：SDK v0.2.0 升级后全量重编译）'
        required: false

jobs:
  test-and-build:
    runs-on: self-hosted
    # 直接在 self-hosted runner 上编译，Go 版本与 Worker 运行环境保持一致
    # 无需 Docker container，runner 本机已有匹配版本的 Go

    env:
      # self-hosted runner 与 Master 同机，直接用 localhost
      MASTER_URL: ${{ secrets.MASTER_URL || 'http://localhost:8090' }}
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
      # 私有仓库不走公共 proxy，直接从 GitHub 拉
      GOPRIVATE: "github.com/A0dongq1N/*"
      GOPROXY: "direct"
      GIT_TERMINAL_PROMPT: "0"
      # CI 进程可能 HOME 不同，显式设置 GOPATH
      GOPATH: "/root/go"
      GOMODCACHE: "/root/go/pkg/mod"
      HOME: "/root"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 需要 HEAD~1 做 diff 检测变更脚本

      # 配置 git 凭证：用 PAT 访问私有依赖仓库 jarvan4-platform
      - name: Configure git for private modules
        run: |
          echo "machine github.com login x-access-token password ${PRIVATE_PAT}" > ~/.netrc
          chmod 600 ~/.netrc
          git ls-remote https://github.com/A0dongq1N/jarvan4-platform.git HEAD
        env:
          PRIVATE_PAT: ${{ secrets.PRIVATE_PAT }}

      # Clone jarvan4-platform main 分支，用最新代码编译 .so
      # 保证 .so 和 worker 二进制使用相同的 jarvan4-platform 版本
      - name: Clone jarvan4-platform (latest main)
        run: |
          git clone --depth 1 https://github.com/A0dongq1N/jarvan4-platform.git /tmp/jarvan4-platform
          # 用 replace 指向本地 clone，覆盖 go.mod 里的 v0.1.0
          go mod edit -replace github.com/A0dongq1N/jarvan4-platform=/tmp/jarvan4-platform
          go mod tidy

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet -tags plugin ./...

      - name: Build all scripts (sanity check)
        run: |
          mkdir -p /tmp/jarvan4-script-build
          for d in scripts/*/; do
            [ -f "$d/main.go" ] || continue
            name=$(basename "$d")
            # 跳过下划线前缀目录（_target/_test/_panic_test 等非正式脚本）
            [[ "$name" == _* ]] && continue
            echo "==> building $name"
            go build -tags plugin -buildmode=plugin \
              -o "/tmp/jarvan4-script-build/${name}.so" "./$d"
          done

      - name: Detect changed scripts
        id: changed
        run: |
          # 检测本次 push 改动的脚本目录
          # workflow_dispatch 或 go.mod/go.sum 变化时全量重编译（SDK 升级需要全量重编译）
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED=$(ls scripts/)
          else
            # 检查 go.mod/go.sum 是否变化
            DEPS_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'go.mod' 'go.sum' | head -1)
            if [ -n "$DEPS_CHANGED" ]; then
              echo "go.mod/go.sum changed, full rebuild"
              CHANGED=$(ls scripts/)
            else
              CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'scripts/**' \
                | grep '^scripts/' \
                | cut -d'/' -f2 \
                | sort -u)
            fi
          fi
          echo "scripts=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed scripts: $CHANGED"

      - name: Build plugins
        run: |
          mkdir -p dist
          COMMIT_HASH="${GITHUB_SHA}"
          CHANGED_SCRIPTS="${{ steps.changed.outputs.scripts }}"

          for name in $CHANGED_SCRIPTS; do
            dir="scripts/${name}"
            if [ ! -d "$dir" ]; then
              echo "⚠️  目录 $dir 不存在，跳过"
              continue
            fi
            echo "🔨 编译 $name ..."
            mkdir -p "dist/${name}"
            go build -tags plugin -buildmode=plugin \
              -o "dist/${name}/${COMMIT_HASH}.so" \
              "./${dir}"
            echo "✓ dist/${name}/${COMMIT_HASH}.so"
          done
        env:
          GOPRIVATE: "github.com/A0dongq1N/*"

      - name: Upload to COS & Notify Master
        run: |
          COMMIT_HASH="${GITHUB_SHA}"
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          AUTHOR=$(git log -1 --pretty=format:'%an')
          CHANGED_SCRIPTS="${{ steps.changed.outputs.scripts }}"

          # 安装腾讯云 CLI
          pip install coscmd -q

          coscmd config \
            -a "$COS_SECRET_ID" \
            -s "$COS_SECRET_KEY" \
            -b "$COS_BUCKET" \
            -r "$COS_REGION"

          for name in $CHANGED_SCRIPTS; do
            SO_FILE="dist/${name}/${COMMIT_HASH}.so"
            if [ ! -f "$SO_FILE" ]; then
              echo "⚠️  $SO_FILE 不存在，跳过上传"
              continue
            fi

            # 上传 .so 到 COS（版本化文件名 + 固定 latest 文件名）
            COS_KEY_VERSIONED="scripts/${name}/${COMMIT_HASH}.so"
            COS_KEY_LATEST="scripts/${name}/${name}.so"
            echo "⬆️  上传 $SO_FILE → cos://${COS_BUCKET}/${COS_KEY_VERSIONED}"
            coscmd upload "$SO_FILE" "$COS_KEY_VERSIONED"
            echo "⬆️  上传 $SO_FILE → cos://${COS_BUCKET}/${COS_KEY_LATEST} (latest)"
            coscmd upload "$SO_FILE" "$COS_KEY_LATEST"

            # 通知 Master 新版本可用（artifactUrl 用固定 latest 路径）
            echo "📡 通知 Master: name=$name commitHash=${COMMIT_HASH:0:12}"
            HTTP_CODE=$(curl -s -o /tmp/publish_resp.json -w "%{http_code}" \
              -X POST "${MASTER_URL}/api/internal/scripts/publish" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"${name}\",
                \"commitHash\": \"${COMMIT_HASH}\",
                \"artifactUrl\": \"${COS_KEY_LATEST}\",
                \"commitMsg\": \"${COMMIT_MSG}\",
                \"author\": \"${AUTHOR}\",
                \"sourceRepo\": \"${{ github.server_url }}/${{ github.repository }}\",
                \"sourcePath\": \"scripts/${name}/main.go\"
              }")

            if [ "$HTTP_CODE" = "200" ]; then
              RESP_CODE=$(python3 -c "import json,sys; print(json.load(open('/tmp/publish_resp.json'))['code'])")
              if [ "$RESP_CODE" = "0" ]; then
                echo "✓ Master 已更新脚本 $name"
              else
                echo "✗ Master 返回业务错误: $(cat /tmp/publish_resp.json)"
                exit 1
              fi
            else
              echo "✗ Master 通知失败，HTTP $HTTP_CODE: $(cat /tmp/publish_resp.json)"
              exit 1
            fi
          done
